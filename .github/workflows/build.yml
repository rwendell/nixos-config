name: Build NixOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Build system
        run: |
          nix build --print-build-logs .#nixosConfigurations.cappuccino.config.system.build.toplevel

      - name: Build ISO image (optional)
        run: |
          nix build --print-build-logs .#nixosConfigurations.cappuccino.config.system.build.isoImage
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nixos-artifacts
          path: result
